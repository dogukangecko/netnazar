(function(){
  const sel=document.getElementById('lang');
  LANGS.forEach(([c,n])=>{const o=document.createElement('option');o.value=c;o.textContent=n;sel.appendChild(o);});
  function apply(l){
    const d=I18N[l]||I18N.en;
    document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(d[k]!=null) el.innerHTML=d[k];});
    document.documentElement.lang=l;
    document.documentElement.dir=(l==='ar')?'rtl':'ltr';
    if(d['meta.title']) document.title=d['meta.title'];
    const md=document.querySelector('meta[name="description"]'); if(md&&d['meta.desc']) md.setAttribute('content',d['meta.desc']);
    sel.value=l; try{localStorage.setItem('nn_lang',l);}catch(e){}
  }
  let l; try{l=localStorage.getItem('nn_lang');}catch(e){}
  if(!l){const b=(navigator.language||'en').slice(0,2).toLowerCase(); l=I18N[b]?b:'en';}
  apply(l);
  sel.addEventListener('change',()=>apply(sel.value));
})();
</script>
